<!DOCTYPE html><html lang="vi"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Wayground Quiz Lobby</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style data-purpose="custom-glassmorphism">
    /* Custom styles to enhance the glassmorphism effect and background */
    body {
      background-color: #0f0c29; /* Fallback */
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      margin: 0;
      height: 100vh;
      overflow: hidden;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    /* Animated background orbs for depth behind the glass */
    .bg-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      z-index: 0;
      animation: float 20s infinite ease-in-out alternate;
    }
    .orb-1 { width: 400px; height: 400px; background: rgba(255, 0, 150, 0.4); top: -100px; left: -100px; }
    .orb-2 { width: 500px; height: 500px; background: rgba(100, 0, 255, 0.4); bottom: -150px; right: 10%; animation-delay: -5s; }
    .orb-3 { width: 300px; height: 300px; background: rgba(0, 200, 255, 0.3); top: 40%; left: 30%; animation-delay: -10s; }

    @keyframes float {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(50px, 50px) scale(1.1); }
    }

    /* Core glass utility */
    .glass-panel {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
    }

    .glass-button {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      transition: all 0.2s ease;
    }
    .glass-button:hover {
      background: rgba(255, 255, 255, 0.2);
      transform: translateY(-1px);
    }

    /* Font adjustments for codes */
    .font-code { font-family: 'Courier New', Courier, monospace; letter-spacing: 0.1em; }
  </style>
</head>
<body class="text-white flex flex-col relative">
<!-- BEGIN: Background Elements -->
<div class="bg-orb orb-1"></div>
<div class="bg-orb orb-2"></div>
<div class="bg-orb orb-3"></div>
<!-- END: Background Elements -->
<!-- BEGIN: Header Section -->
<header class="flex justify-between items-center p-4 lg:p-6 z-10 w-full" data-purpose="main-navigation">
<!-- Logo Area -->
<div class="flex flex-col">
<div class="flex items-center gap-2">
<!-- Abstract Logo Icon -->
<svg class="w-6 h-6 text-white" fill="currentColor" viewBox="0 0 24 24">
<path d="M3 3h4v18H3V3zm7 7h4v11h-4V10zm7-5h4v16h-4V5z"></path>
</svg>
<span class="text-2xl font-black tracking-tighter uppercase italic">Wayground</span>
</div>
<span class="text-xs text-gray-400 ml-8 -mt-1 font-medium">formerly Quizizz</span>
</div>
<!-- Right Controls -->
<div class="flex items-center gap-3">
<button class="glass-button px-4 py-2 rounded-lg flex items-center gap-2 text-sm font-medium">
<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M7 21a4 4 0 01-4-4V5a2 2 0 012-2h4a2 2 0 012 2v12a4 4 0 01-4 4zm0 0h12a2 2 0 002-2v-4a2 2 0 00-2-2h-2.343M11 7.343l1.657-1.657a2 2 0 012.828 0l2.829 2.829a2 2 0 010 2.828l-8.486 8.485M7 17h.01" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
        Chủ đề
      </button>
<button aria-label="Magic Wand" class="glass-button p-2 rounded-lg">
<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
</button>
<button aria-label="Sound Toggle" class="glass-button p-2 rounded-lg">
<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
</button>
<button aria-label="Fullscreen" class="glass-button p-2 rounded-lg">
<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
</button>
<button class="bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-6 rounded-lg transition-colors ml-2 shadow-lg shadow-red-900/50">
        Kết thúc
      </button>
</div>
</header>
<!-- END: Header Section -->
<!-- BEGIN: Main Content Area -->
<main class="flex-1 flex flex-col justify-center items-center p-4 z-10 w-full max-w-5xl mx-auto" data-purpose="lobby-content">
<!-- Container for Top Two Panels -->
<div class="flex flex-col md:flex-row gap-6 w-full mb-6">
<!-- BEGIN: Join Details Panel -->
<section class="glass-panel rounded-3xl p-8 flex-1 flex flex-col justify-center" data-purpose="join-instructions">
<!-- Step 1: URL -->
<div class="flex items-center justify-between mb-8">
<div class="flex items-center gap-6">
<div class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center font-bold text-lg border border-white/20 shadow-inner">1</div>
<div>
<p class="text-gray-300 text-sm mb-1 uppercase tracking-wider font-semibold">Tham gia bằng mọi thiết bị</p>
<h2 class="text-3xl md:text-4xl font-bold">joinmyquiz.com</h2>
</div>
</div>
<button aria-label="Copy Link" class="glass-button p-3 rounded-xl text-gray-300 hover:text-white">
<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
</button>
</div>
<!-- Divider -->
<hr class="border-white/10 mb-8">
<!-- Step 2: Code -->
<div class="flex items-center justify-between">
<div class="flex items-center gap-6">
<div class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center font-bold text-lg border border-white/20 shadow-inner">2</div>
<div>
<p class="text-gray-300 text-sm mb-1 uppercase tracking-wider font-semibold">Nhập mã tham gia</p>
<h1 class="text-6xl md:text-7xl font-bold font-code tracking-widest drop-shadow-md">131572</h1>
</div>
</div>
<button aria-label="Copy Code" class="glass-button p-3 rounded-xl text-gray-300 hover:text-white">
<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
</button>
</div>
</section>
<!-- END: Join Details Panel -->
<!-- BEGIN: Share Panel -->
<section class="glass-panel rounded-3xl p-8 w-full md:w-64 flex flex-col items-center justify-center shrink-0" data-purpose="share-options">
<!-- Placeholder for QR Code (styled to look like a scanned block) -->
<div class="w-32 h-32 bg-white p-2 rounded-xl mb-6 shadow-lg">
<img alt="Mã QR tham gia" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCTc2HvfYn2w8VxRqQtGeeFghwgJwb6EchVWfscSA4fEQdCBOlWfyyshQ034krAtBKimOBUHlnnlbiTjuYNygKVJS7GRc2rngAwaxfWPpxevjjnifkVeW4dcfFhFMhHNjiphteusFpk8eodPR4wGuOeDoz9d2GOfTNSaWFhiV0wL-pRRiOJic6i_kL0zSrkQqLeijuJndhJrR8JPTmsQ-EZ-_kGxgdfrc8CHgOBXJrcdwKpn-RhnV9oHkfYjo8-JJYOL_GVFnONrjDf">
</div>
<p class="text-gray-300 text-sm mb-4 font-medium uppercase tracking-wider">Chia sẻ qua</p>
<div class="flex items-center gap-3">
<button aria-label="Copy Link" class="glass-button p-2.5 rounded-full hover:bg-white/20 transition-colors">
<svg class="w-5 h-5 text-blue-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
</button>
<button aria-label="Google Classroom" class="glass-button p-2.5 rounded-full hover:bg-white/20 transition-colors">
<!-- Generic Class Icon -->
<svg class="w-5 h-5 text-green-400" fill="currentColor" viewBox="0 0 24 24"><path d="M12 3L1 9l4 2.18v6L12 21l7-3.82v-6l2-1.09V17h2V9L12 3zm6.82 6L12 12.72 5.18 9 12 5.28 18.82 9zM17 15.99l-5 2.73-5-2.73v-3.72L12 15l5-2.73v3.72z"></path></svg>
</button>
<button aria-label="More Options" class="glass-button p-2.5 rounded-full hover:bg-white/20 transition-colors">
<svg class="w-5 h-5 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
</button>
</div>
</section>
<!-- END: Share Panel -->
</div>
<!-- BEGIN: Bottom Action Bar -->
<section class="w-full flex flex-col md:flex-row justify-center items-center gap-4 relative" data-purpose="lobby-actions">
<!-- Auto Start Toggle -->
<div class="glass-panel rounded-xl flex items-center p-2 absolute left-0 md:relative">
<span class="px-4 text-sm font-medium">Tự động bắt đầu bài ...</span>
<button aria-label="Enable Auto Start" class="bg-white/20 hover:bg-white/30 rounded-lg p-2 transition-colors ml-2">
<svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path clip-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" fill-rule="evenodd"></path></svg>
</button>
</div>
<!-- Main Start Button -->
<button class="bg-gradient-to-r from-pink-500 to-fuchsia-600 hover:from-pink-400 hover:to-fuchsia-500 text-white font-black text-xl py-4 px-16 rounded-2xl shadow-[0_0_20px_rgba(236,72,153,0.5)] transform transition-transform hover:scale-105 active:scale-95 border border-pink-400/50 uppercase tracking-widest w-full md:w-auto">
        BẮT ĐẦU
      </button>
<!-- Participant Count -->
<div class="glass-panel rounded-xl flex items-center gap-3 px-6 py-4 absolute right-0 md:relative">
<svg class="w-6 h-6 text-gray-300" fill="currentColor" viewBox="0 0 20 20"><path d="M9 6a3 3 0 11-6 0 3 3 0 016 0zM17 6a3 3 0 11-6 0 3 3 0 016 0zM12.93 17c.046-.327.07-.66.07-1a6.97 6.97 0 00-1.5-4.33A5 5 0 0119 16v1h-6.07zM6 11a5 5 0 015 5v1H1v-1a5 5 0 015-5z"></path></svg>
<span class="text-2xl font-bold">0</span>
</div>
</section>
<!-- END: Bottom Action Bar -->
</main>
<!-- END: Main Content Area -->
</body></html>
