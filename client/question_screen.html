<!DOCTYPE html><html lang="vi"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Glassmorphism Quiz UI</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style data-purpose="glassmorphism">
    /* Base styles for the glass effect */
    .glass-panel {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
    }

    /* Glow effects for options */
    .glow-1 { box-shadow: inset 0 0 20px rgba(163, 230, 53, 0.2), 0 0 20px rgba(163, 230, 53, 0.1); }
    .glow-2 { box-shadow: inset 0 0 20px rgba(168, 85, 247, 0.2), 0 0 20px rgba(168, 85, 247, 0.1); }
    .glow-3 { box-shadow: inset 0 0 20px rgba(249, 115, 22, 0.2), 0 0 20px rgba(249, 115, 22, 0.1); }
    .glow-4 { box-shadow: inset 0 0 20px rgba(45, 212, 191, 0.2), 0 0 20px rgba(45, 212, 191, 0.1); }

    /* Custom animated background */
    .bg-animated-gradient {
      background: linear-gradient(-45deg, #2e0854, #4c0e66, #1f0538, #3a0b52);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
  </style>
<script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          }
        }
      }
    }
  </script>
</head>
<body class="bg-animated-gradient min-h-screen text-white font-sans antialiased overflow-hidden flex flex-col relative">
<!-- Background Decoration Elements (Optional, for extra depth) -->
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-purple-600 rounded-full mix-blend-multiply filter blur-[100px] opacity-30 animate-pulse"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-pink-600 rounded-full mix-blend-multiply filter blur-[100px] opacity-30 animate-pulse" style="animation-delay: 2s;"></div>
<!-- BEGIN: Top Bar -->
<header class="w-full flex justify-between items-center p-4 relative z-10">
<!-- Left side: Stats/Controls -->
<div class="flex items-center gap-3">
<div class="glass-panel flex items-center justify-center w-10 h-10 rounded-lg transition-transform hover:scale-105 cursor-pointer">
<svg class="text-gray-300" fill="none" height="20" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="20" xmlns="http://www.w3.org/2000/svg"><path d="M3 3v18h18"></path><path d="m19 9-5 5-4-4-3 3"></path></svg>
</div>
<div class="glass-panel flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-medium">
<svg class="text-blue-400" fill="none" height="16" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="16" xmlns="http://www.w3.org/2000/svg"><path d="M12 2v20"></path><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
<span class="">0</span>
</div>
<div class="glass-panel px-4 py-2 rounded-lg text-sm font-medium hover:bg-white/10 transition-colors cursor-pointer">
        Thưởng
      </div>
</div>
<!-- Right side: Menu -->
<div class="flex items-center gap-3">
<button class="glass-panel w-10 h-10 flex items-center justify-center rounded-lg hover:bg-white/10 transition-colors">
<svg fill="none" height="20" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="20" xmlns="http://www.w3.org/2000/svg"><line x1="4" x2="20" y1="12" y2="12"></line><line x1="4" x2="20" y1="6" y2="6"></line><line x1="4" x2="20" y1="18" y2="18"></line></svg>
</button>
<button class="glass-panel w-10 h-10 flex items-center justify-center rounded-lg hover:bg-white/10 transition-colors">
<svg fill="none" height="20" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="20" xmlns="http://www.w3.org/2000/svg"><path d="M21 12h-4"></path><path d="M7 12H3"></path><path d="M12 3v4"></path><path d="M12 17v4"></path><path d="m18.36 5.64-2.83 2.83"></path><path d="m8.47 15.53-2.83 2.83"></path><path d="m5.64 5.64 2.83 2.83"></path><path d="m15.53 15.53 2.83 2.83"></path></svg>
</button>
</div>
</header>
<!-- END: Top Bar -->
<!-- BEGIN: Main Content Area -->
<main class="flex-grow flex flex-col items-center justify-center p-6 sm:p-12 gap-8 w-full max-w-7xl mx-auto relative z-10">
<!-- Question Progress Badge -->
<div class="absolute top-0 transform -translate-y-1/2 glass-panel px-4 py-1.5 rounded-full text-sm font-semibold text-yellow-300 z-20" style="background: rgba(0,0,0,0.6); backdrop-filter: blur(10px);">
      1 / 29
    </div>
<!-- Question Card -->
<section class="glass-panel w-full rounded-2xl p-8 md:p-12 shadow-2xl relative">
<h1 class="text-xl md:text-3xl font-medium leading-relaxed text-center tracking-wide text-white/90 drop-shadow-md">
        Nhà quản lý là người chịu trách nhiệm trực tiếp điều hành, phối hợp và kiểm tra công việc của nhân viên dưới quyền, đây là mô tả cho vai trò quản lý nào?
      </h1>
</section>
<!-- Options Grid -->
<section class="w-full grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 md:gap-6 mt-8">
<!-- Option 1 -->
<button class="glass-panel glow-1 group relative flex flex-col items-center justify-center min-h-[250px] p-6 rounded-2xl transition-all duration-300 hover:-translate-y-2 hover:shadow-[0_10px_40px_rgba(163,230,53,0.3)] border-lime-400/30 overflow-hidden">
<div class="absolute inset-0 bg-gradient-to-br from-lime-400/40 via-yellow-400/20 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
<span class="absolute top-4 right-4 text-xs font-bold w-6 h-6 flex items-center justify-center rounded-md border border-white/20 bg-white/10">1</span>
<span class="text-xl md:text-2xl font-semibold text-lime-50 drop-shadow-sm text-center">Vai trò lãnh đạo.</span>
</button>
<!-- Option 2 -->
<button class="glass-panel glow-2 group relative flex flex-col items-center justify-center min-h-[250px] p-6 rounded-2xl transition-all duration-300 hover:-translate-y-2 hover:shadow-[0_10px_40px_rgba(168,85,247,0.3)] border-purple-400/30 overflow-hidden">
<div class="absolute inset-0 bg-gradient-to-br from-purple-500/40 via-pink-500/20 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
<span class="absolute top-4 right-4 text-xs font-bold w-6 h-6 flex items-center justify-center rounded-md border border-white/20 bg-white/10">2</span>
<span class="text-xl md:text-2xl font-semibold text-purple-50 drop-shadow-sm text-center">Vai trò truyền thông.</span>
</button>
<!-- Option 3 -->
<button class="glass-panel glow-3 group relative flex flex-col items-center justify-center min-h-[250px] p-6 rounded-2xl transition-all duration-300 hover:-translate-y-2 hover:shadow-[0_10px_40px_rgba(249,115,22,0.3)] border-orange-400/30 overflow-hidden">
<div class="absolute inset-0 bg-gradient-to-br from-orange-500/40 via-red-500/20 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
<span class="absolute top-4 right-4 text-xs font-bold w-6 h-6 flex items-center justify-center rounded-md border border-white/20 bg-white/10">3</span>
<span class="text-xl md:text-2xl font-semibold text-orange-50 drop-shadow-sm text-center">Vai trò liên kết.</span>
</button>
<!-- Option 4 -->
<button class="glass-panel glow-4 group relative flex flex-col items-center justify-center min-h-[250px] p-6 rounded-2xl transition-all duration-300 hover:-translate-y-2 hover:shadow-[0_10px_40px_rgba(45,212,191,0.3)] border-teal-400/30 overflow-hidden">
<div class="absolute inset-0 bg-gradient-to-br from-teal-400/40 via-cyan-400/20 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
<span class="absolute top-4 right-4 text-xs font-bold w-6 h-6 flex items-center justify-center rounded-md border border-white/20 bg-white/10">4</span>
<span class="text-xl md:text-2xl font-semibold text-teal-50 drop-shadow-sm text-center">Vai trò đại diện.</span>
</button>
</section>
</main>
<!-- END: Main Content Area -->
<!-- BEGIN: Bottom Footer -->
<footer class="w-full p-6 flex justify-between items-end relative z-10">
<!-- User Info -->
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-full overflow-hidden border-2 border-white/20 shadow-lg bg-gray-800 flex items-center justify-center">
<!-- Using placeholder for user avatar -->
<img alt="User Avatar" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD51ySGSBna2iOERPHlU0XUF4jd5LoLPvfHhPYnx8LZcIv4G3CRPZXA2FCzz0VHpIS-lMtR6Ggf4A3I9RnAOkARgw75xCi9LgPGyUkeST5sVgu1zIQSfVHXtOCLsugR14rPQ-0E_BnXaXdaS4azbQ091P-FC0jXQ8V1BBdcDqbEwa7fYM0XGg0td-qvKNxaU5t8x0L7guZhKxXrAyT_0_kUSUSfNSK75SZ0OF0wyk-g-nPpHBazf5JlopZdM1dUQfXWio83fcwMOyNP">
</div>
<span class="font-semibold text-sm tracking-wide text-white/80">Chiến lăng trọng</span>
</div>
<!-- Power-ups / Tools -->
<div class="flex gap-2">
<!-- Powerup 1 -->
<button class="glass-panel w-10 h-10 rounded-lg flex items-center justify-center hover:bg-orange-500/20 transition-colors border-orange-500/50">
<svg class="text-orange-400" fill="none" height="20" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="20" xmlns="http://www.w3.org/2000/svg"><path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"></path><path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"></path><path d="M9 12H4s.55-3.03 2-4c1.62-1.08 5 0 5 0"></path><path d="M12 15v5s3.03-.55 4-2c1.08-1.62 0-5 0-5"></path></svg>
</button>
<!-- Powerup 2 -->
<button class="glass-panel w-10 h-10 rounded-lg flex items-center justify-center hover:bg-green-500/20 transition-colors border-green-500/50">
<svg class="text-green-400" fill="none" height="20" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="20" xmlns="http://www.w3.org/2000/svg"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
</button>
<!-- Powerup 3 -->
<button class="glass-panel w-10 h-10 rounded-lg flex items-center justify-center hover:bg-blue-500/20 transition-colors border-blue-500/50">
<span class="text-blue-400 font-bold text-sm tracking-tighter">2x</span>
</button>
</div>
</footer>
<!-- END: Bottom Footer -->


</body></html>
